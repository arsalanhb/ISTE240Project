<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        form {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div id="singleResult">
        <label for="searchOption">Search By:</label>
        <select name="searchOption" id="searchOption">
            <option value="dishId">Dish ID</option>
            <option value="dishName">Dish Name</option>
            <option value="category">Category</option>
            <option value="price">Price</option>
        </select>
        <label for="requested">Request: </label>
        <input id="requested" name="requested" type="search">
        <button id="submit">Submit</button>
    </div>
    <button id="addBtn">Add</button>
    <form id="addDish">
        <div>
            <label for="dishName">Dish Name: </label>
            <input type="text" id="dishName" name="dishName" placeholder="dishName">
        </div>
        <div>
            <label for="description">Description: </label>
            <input type="text" id="description" name="description" placeholder="description">
        </div>
        <div>
            <label for="chefOptionSpecial">Category: </label>
            <select id="chefOptionSpecial">
            </select>
        </div>
        <div>
            <label for="price">Price: </label>
            <input type="number" id="price" name="price" placeholder="price">
        </div>

        <button id="addSubmit" type="button">Submit</button>
    </form>

    <button id="updBtn">Update</button>
    <form id="updDish">
        <div>
            <label for="idUpd">Dish Id: </label>
            <input type="number" id="idUpd" name="idUpd" placeholder="ID">
        </div>
        <div id="singleResultUpd">
            <label for="updOption">Search By:</label>
            <select name="updOption" id="updOption">
                <option value="description">Description</option>
                <option value="price">Price</option>
                <option value="available">Availability</option>
            </select>
            <label for="requestedUpd"></label>
            <input id="requestedUpd" name="requested" type="search">
        </div>
        <button id="updSubmit" type="button">Submit</button>
    </form>
    <button id="delBtn">Delete</button>
    <form id="delDish">
        <div>
            <label for="dishIdDel">Dish Id: </label>
            <input type="text" id="dishIdDel" name="dishIdDel" placeholder="dishIdDel">
        </div>
        <button id="delSubmit">Submit</button>
    </form>
    <div id="dishDiv"></div>
</body>
<script>
    let tab = "<table>"

    function checkEmpty(data){
        return data === ""
    }
    function checkNull(data){
        return data === null
    }

    function tableInit(){
        tab += "<tr>"
        tab +=  "<th>ID</th>"
        tab +=  "<th>Dish Name</th>"
        tab +=  "<th>Description</th>"
        tab +=  "<th>Price</th>"
        tab +=  "<th>Category</th>"
        tab +=  "<th>Cooked By</th>"
        tab +=  "</tr>"
    }

    function tableSeed(data){
        tab += "<tr>"
        tab +=  `<td>${data.dishId}</td>`
        tab +=  `<td>${data.dishName}</td>`
        tab +=  `<td>${data.description}</td>`
        tab +=  `<td>${data.price}</td>`
        tab +=  `<td>${data.category}</td>`
        tab +=  "</tr>"
        console.log(data)
    }
    $(document).ready(function(){
        $("#addDish,#updDish,#delDish").hide()
        let api = "/api/dished"
        let chefApi = "/api/chefSpecialties"
        $.get(api, function(data){
            tableInit(tab)
            for(let i = 0; i<data.length; i++){
                let line = data[i];
                tableSeed(line)
            }
            tab+="</table>"
            $("#dishDiv").html(tab)

        })

        $.get(chefApi, function(data){
            let options = ""
            for(let i = 0; i<data.length;i++){
                options+=`<option value="${data[i]}">${data[i]}</option>`
                console.log(options)
            }
            $("#chefOptionSpecial").html(options)
        })
    })
    document.addEventListener('click', function() {
        tab="<table>"
        tableInit()
    }, true);

    $("#submit").click(function(){
        let method = $("#searchOption").val()
        let requested = $("#requested").val()
        let apiUrl = `/api/dished/${method}/${requested}`

        if((method === "dishName" || method === "category") && requested.search("^[a-zA-Z]+$")){
            alert("Must enter text")
            return;
        }
        if((method === "dishId" || method === "price") && requested.search("^[0-9]+$")){
            alert("Must enter a number")
            return
        }

        $.ajax({
            url: apiUrl,
            type: 'GET',
            dataType: "json",
            success: function(data){
                for(let i = 0; i<data.length; i++){
                    let line = data[i];
                    tableSeed(line)
                }
                tab+="</table>"
                $("#dishDiv").html(tab)
            },
            error: function(data){
                alert(data.responseText)
            }
        })


    })

    $("#addBtn").click(function(){
       $("#addDish").toggle()
    })
    $("#updBtn").click(function(){
        $("#updDish").toggle()
    })
    $("#delBtn").click(function(){
        $("#delDish").toggle()
    })


    $("#addSubmit").click(function(event) {
        event.preventDefault()
        let apiUrl = "/api/addDish"
        let dishName = $("#dishName").val()
        let description = $("#description").val()
        let category = $("#chefOptionSpecial").val()
        let price = $("#price").val()

        if(checkEmpty(dishName) || checkEmpty(description) || checkEmpty(category) || checkEmpty(price)){
            alert("One or more of the fields is empty")
            return;
        }
        $.ajax({
            url: apiUrl,
            type: 'POST',
            contentType:'application/json',
            data: JSON.stringify({dishName: dishName, description: description, category: category, price: price}),
            success: function (data) {
                for (let i = 0; i < data.length; i++) {
                    let line = data[i]
                    tableSeed(line)
                }
                tab += "</table>"
                $("#dishDiv").html(tab)
            },
            error: function (data) {
                alert(data.responseText)

            }

        })

    })
    $("#updSubmit").click(function (event) {
        event.preventDefault()
        let chefId = $("#idUpd").val()
        let method = $("#updOption").val()
        let requested = $("#requestedUpd").val()
        let apiUrl = `/api/dished/${method}/${chefId}/${requested}`
        if(checkEmpty(chefId) || checkEmpty(requested)){
            alert("One or more of the fields is empty")
            return;
        }

        $.ajax({
            url: apiUrl,
            type: 'POST',
            data: {requested},
            success: function (data) {
                for (let i = 0; i < data.length; i++) {
                    console.log(data)
                    let line = data[i]
                    tableSeed(line)
                }
                tab += "</table>"
                $("#dishDiv").html(tab)
            },
            error: function (data) {
                alert(data.responseText)

            }

        })

    })

    $("#delSubmit").click(function(event){
        event.preventDefault()
        let apiUrl = "/api/delDish"
        let id = $("#dishIdDel").val();
        $.ajax({
            url: apiUrl,
            type: 'POST',
            data:{dishId: id},
            success: function(data){
                alert(data)

            },
            error: function(data){
                alert(data.responseText)

            }
        })

    })

</script>
</html>
