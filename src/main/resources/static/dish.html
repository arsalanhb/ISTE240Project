<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        form {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div id="singleResult">
        <label for="searchOption">Search By:</label>
        <select name="searchOption" id="searchOption">
            <option value="dishId">Dish ID</option>
            <option value="dishName">Dish Name</option>
            <option value="category">Category</option>
            <option value="price">Price</option>
        </select>
        <label for="requested">Request: </label>
        <input id="requested" name="requested" type="search">
        <button id="submit">Submit</button>
    </div>
    <button id="addBtn">Add</button>
    <form id="addDish">
        <div>
            <label for="dishName">Dish Name: </label>
            <input type="text" id="dishName" name="dishName" placeholder="dishName">
        </div>
        <div>
            <label for="description">Description: </label>
            <input type="text" id="description" name="description" placeholder="description">
        </div>
        <div>
            <label for="chefOptionSpecial">Category: </label>
            <select id="chefOptionSpecial">
            </select>
        </div>
        <div>
            <label for="price">Price: </label>
            <input type="number" id="price" name="price" placeholder="price">
        </div>

        <button id="addSubmit" type="button">Submit</button>
    </form>

    <button id="updBtn">Update</button>
    <form id="updDish">
        <div>
            <label for="idUpd">Dish Id: </label>
            <input type="number" id="idUpd" name="idUpd" placeholder="ID">
        </div>
        <div>
            <label for="dishNameUpd">Dish Name: </label>
            <input type="text" id="dishNameUpd" name="dishNameUpd" placeholder="dishName">
        </div>
        <div>
            <label for="available">Available: </label>
            <input type="checkbox" id="available" name="available" placeholder="available">
        </div>
        <div>
            <label for="descriptionUpd">Description: </label>
            <input type="text" id="descriptionUpd" name="descriptionUpd" placeholder="description">
        </div>
        <div>
            <label for="priceUpd">Price: </label>
            <input type="number" id="priceUpd" name="priceUpd" placeholder="price">
        </div>
        <button id="updSubmit" type="button">Submit</button>
    </form>
    <button id="delBtn">Delete</button>
    <form id="delDish">
        <div>
            <label for="dishIdDel">Dish Id: </label>
            <input type="text" id="dishIdDel" name="dishIdDel" placeholder="dishIdDel">
        </div>
        <button id="delSubmit">Submit</button>
    </form>
    <div id="dishDiv"></div>
</body>
<script>
    let tab = "<table>"

    function checkEmpty(){
        for(let i=0; i<arguments.length; i++){
            if(arguments[i]===""){
                alert("One or more fields are empty")
                return false;
            }
        }
        return true
    }

    function checkType(data, reg){
        return data.search(reg) !== -1;

    }
    function validation(dishName, description, price,){
        if(!checkType(dishName,/^[a-zA-Z ]+$/) || !checkType(description,/^[a-zA-Z ]+$/)){
            alert("Not valid type, enter text please for one or more of following entries: Dish Name, Description")
            return false
        }

        if(!checkType(price, /^[0-9]+[.]?[0-9]+$/)){
            alert("Not valid type, enter a number please for following entry(s): price")
            return false
        }
        return true
    }

    function tableInit(){
        tab += "<tr>"
        tab +=  "<th>ID</th>"
        tab +=  "<th>Dish Name</th>"
        tab +=  "<th>Description</th>"
        tab +=  "<th>Price</th>"
        tab +=  "<th>Category</th>"
        tab +=  "</tr>"
    }

    function tableSeed(data){
        tab += "<tr>"
        tab +=  `<td>${data.dishId}</td>`
        tab +=  `<td>${data.dishName}</td>`
        tab +=  `<td>${data.description}</td>`
        tab +=  `<td>${data.price}</td>`
        tab +=  `<td>${data.category}</td>`
        tab +=  "</tr>"
        console.log(data)
    }
    $(document).ready(function(){
        $("#addDish,#updDish,#delDish").hide()
        let api = "/api/dished"
        let chefApi = "/api/chefSpecialties"
        $.get(api, function(data){
            tableInit()
            for(let i = 0; i<data.length; i++){
                let line = data[i];
                tableSeed(line)
            }
            tab+="</table>"
            $("#dishDiv").html(tab)

        })

        $.get(chefApi, function(data){
            let options = ""
            for(let i = 0; i<data.length;i++){
                options+=`<option value="${data[i]}">${data[i]}</option>`
                console.log(options)
            }
            $("#chefOptionSpecial").html(options)
        })
    })


    $("#submit").click(function(){
        let method = $("#searchOption").val()
        let requested = $("#requested").val()
        let apiUrl = `/api/dished/${method}/${requested}`


        $.ajax({
            url: apiUrl,
            type: 'GET',
            dataType: "json",
            success: function(data){
                tab="<table>"
                tableInit()
                for(let i = 0; i<data.length; i++){
                    let line = data[i];
                    tableSeed(line)
                }
                tab+="</table>"
                $("#dishDiv").html(tab)
            },
            error: function(data){
                alert(data.responseText)
            }
        })


    })

    $("#addBtn").click(function(){
       $("#addDish").toggle()
    })
    $("#updBtn").click(function(){
        $("#updDish").toggle()
    })
    $("#delBtn").click(function(){
        $("#delDish").toggle()
    })


    $("#addSubmit").click(function(event) {
        event.preventDefault()
        let apiUrl = "/api/addDish"
        let dishName = $("#dishName").val()
        let description = $("#description").val()
        let category = $("#chefOptionSpecial").val()
        let price = $("#price").val()

        if(checkEmpty(dishName, description, category, price) === false){
            return;
        }
        if(!validation(dishName, description, price)){
            return;
        }
        $.ajax({
            url: apiUrl,
            type: 'POST',
            contentType:'application/json',
            data: JSON.stringify({dishName: dishName, description: description, category: category, price: price}),
            success: function (data) {
                tab="<table>"
                tableInit()
                for (let i = 0; i < data.length; i++) {
                    let line = data[i]
                    tableSeed(line)
                }
                tab += "</table>"
                $("#dishDiv").html(tab)
            },
            error: function (data) {
                alert(data.responseText)

            }

        })

    })
    $("#updSubmit").click(function (event) {
        event.preventDefault()
        let dishId = $("#idUpd").val()
        let dishName = $("#dishNameUpd").val()
        let description = $("#descriptionUpd").val()
        let available = $("#available").is(":checked")
        console.log(available)
        let price = $("#priceUpd").val()
        let apiUrl = `/api/dished/update`
        if(checkEmpty(dishId, dishName, description, available, price) === false){
            return;
        }
        if(!validation(dishName, description, price)){
            return
        }

        $.ajax({
            url: apiUrl,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({dishId: dishId, dishName: dishName, description: description, available: available, price: price}),
            success: function (data) {
                tab="<table>"
                tableInit()
                for (let i = 0; i < data.length; i++) {
                    console.log(data)
                    let line = data[i]
                    tableSeed(line)
                }
                tab += "</table>"
                $("#dishDiv").html(tab)
            },
            error: function (data) {
                alert(data.responseText)

            }

        })

    })

    $("#delSubmit").click(function(event){
        event.preventDefault()
        let apiUrl = "/api/delDish"
        let id = $("#dishIdDel").val();
        if(id === ""){
            alert("Must enter ID to delete")
            return
        }
        $.ajax({
            url: apiUrl,
            type: 'DELETE',
            data:{dishId: id},
            success: function(data){
                alert(data)
                tab="<table>"
                newApi = "/api/dished"
                tableInit()
                $.get(newApi, function(data){
                    for(let i = 0; i<data.length; i++){
                        let line = data[i];
                        tableSeed(line)
                    }
                    tab+="</table>"
                    $("#dishDiv").html(tab)
                })

            },
            error: function(data){
                alert(data.responseText)

            }
        })

    })

</script>
</html>
