<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <label for="searchOption">Search By:</label>
    <select name="searchOption" id="searchOption">
        <option value="dishId">Dish ID</option>
        <option value="dishName">Dish Name</option>
    </select>
    <input id="requested"name="requested" type="search">
    <button id="sub">Submit</button>
    <div id="dishDiv"></div>
</body>
<script>
    $(document).ready(function(){
        var api = "/api/dished"
        $.get(api, function(data){
            let tab = "<table>"
            tab += "<tr>"
            tab +=  "<th>ID</th>"
            tab +=  "<th>Dish Name</th>"
            tab +=  "<th>Description</th>"
            tab +=  "<th>Price</th>"
            tab +=  "<th>Category</th>"
            tab +=  "</tr>"
            for(i = 0; i<data.length; i++){
                let line = data[i];
                tab += "<tr>"
                tab +=  `<th>${line.dishId}</th>`
                tab +=  `<th>${line.dishName}</th>`
                tab +=  `<th>${line.description}</th>`
                tab +=  `<th>${line.price}</th>`
                tab +=  `<th>${line.category}</th>`
                tab +=  "</tr>"
            }
            tab+="</table>"
            $("#dishDiv").html(tab)

        })
    })

    $("#sub").click(function(){
        tab = "<table>"
        var method = $("#searchOption").val()
        var requested = $("#requested").val()
        let apiurl = `/api/dished/${method}/${requested}`

        $.get(apiurl, function(data){
            tab += "<tr>"
            tab +=  "<th>ID</th>"
            tab +=  "<th>Dish Name</th>"
            tab +=  "<th>Description</th>"
            tab +=  "<th>Price</th>"
            tab +=  "<th>Category</th>"
            tab +=  "</tr>"
            tab += "<tr>"
            tab +=  `<th>${data.dishId}</th>`
            tab +=  `<th>${data.dishName}</th>`
            tab +=  `<th>${data.description}</th>`
            tab +=  `<th>${data.price}</th>`
            tab +=  `<th>${data.category}</th>`
            tab +=  "</tr>"
            tab+="</table>"
            $("#dishDiv").html(tab)
        })


    })

</script>
</html>
