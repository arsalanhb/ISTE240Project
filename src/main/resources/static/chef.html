<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        form {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div>
        <label for="searchOption">Search By:</label>
        <select name="searchOption" id="searchOption">
            <option value="chefId">Chef Id</option>
            <option value="fullName">Chef Full Name</option>
            <option value="specialty">Specialty</option>
        </select>
        <label for="requested">Request: </label>
        <input id="requested" name="requested" type="search">
        <button id="submit">Submit</button>
    </div>
    <button id="addBtn">Add</button>
    <form id="addChef">
        <div>
            <label for="firstName">First Name: </label>
            <input type="text" id="firstName" name="firstName" placeholder="First Name">
        </div>
        <div>
            <label for="lastName">Last Name: </label>
            <input type="text" id="lastName" name="lastName" placeholder="Last Name">
        </div>
        <div>
            <label for="email">Email: </label>
            <input type="text" id="email" name="email" placeholder="Email">
        </div>
        <div>
            <label for="specialty">Specialty: </label>
            <input type="text" id="specialty" name="specialty" placeholder="Specialty">
        </div>
        <div>
            <label for="salary">Salary: </label>
            <input type="number" step="any" id="salary" name="salary" placeholder="Salary">
        </div>
        <div>
            <label for="yrsOfExperience">Years of Experience: </label>
            <input type="number" step="any" id="yrsOfExperience" name="yrsOfExperience" placeholder="Experience">
        </div>

        <button id="dishChefBtn" type="button">Add</button>
        <div id="dishChef">
        </div>
        <button id="addSubmit" type="button">Submit</button>
    </form>

    <button id="updBtn">Update</button>
    <form id="updChef">
        <div>
            <label for="idUpd">Id: </label>
            <input type="text" id="idUpd" name="idUpd" placeholder="Id">
        </div>
        <div>
            <label for="emailUpd">Email: </label>
            <input type="text" id="emailUpd" name="emailUpd" placeholder="Email">
        </div>
        <div>
            <label for="salaryUpd">Salary: </label>
            <input type="number" step="any" id="salaryUpd" name="salaryUpd" placeholder="Salary">
        </div>
        <div>
            <label for="yrsUpd">Years of Experience: </label>
            <input type="number" step="any" id="yrsUpd" name="yrsUpd" placeholder="Experience">
        </div>
        <button id="updSubmit" type="button">Submit</button>
    </form>
        <button id="delBtn">Delete</button>
        <form id="delChef">
        <div>
            <label for="chefIdDel">Chef Id: </label>
            <input type="text" id="chefIdDel" name="chefIdDel" placeholder="Id">
        </div>
        <button id="delSubmit" type="button">Submit</button>
    </form>
    <div id="chefDiv"></div>
</body>
<script>
    let objects = []

    function checkEmpty(){
        for(let i=0; i<arguments.length; i++){
            if(arguments[i]===""){
                alert("One or more fields are empty")
                return false;
            }
        }
    }

    function tableInit(){
        tab += "<tr>"
        tab +=  "<th>ID</th>"
        tab +=  "<th>First Name</th>"
        tab +=  "<th>Last Name</th>"
        tab +=  "<th>Email</th>"
        tab +=  "<th>Salary</th>"
        tab +=  "<th>Specialty</th>"
        tab +=  "<th>YrsOfExperience</th>"
        tab +=  "</tr>"
    }

    function tableSeed(data){
        tab += "<tr>"
        tab +=  `<td>${data.chefId}</td>`
        tab +=  `<td>${data.firstName}</td>`
        tab +=  `<td>${data.lastName}</td>`
        tab +=  `<td>${data.email}</td>`
        tab +=  `<td>${data.salary}</td>`
        tab +=  `<td>${data.specialty}</td>`
        tab +=  `<td>${data.yrsOfExperience}</td>`
        for(let i = 0; i<data.dishList.length; i++){
            let line = data.dishList[i];
            tab +=  `<td>${line.dishName}: ${line.description}</td>`
        }
        tab += "</tr>"
        console.log(data)
    }


    let tab = "<table>"
    $(document).ready(function(){
        $("#addChef,#updChef,#delChef").hide()
        let api = "/api/chefed"
        $.get(api, function(data){
            for(let i = 0; i<data.length; i++){
                let line = data[i];
                tableSeed(line)
            }
            tab+="</table>"
            $("#chefDiv").html(tab)

        })
    })

    $("#submit").click(function(){
        let method = $("#searchOption").val()
        let requested = $("#requested").val()

        if((method === "specialty" || method === "fullName") && requested.search("^[a-zA-Z ]+$")){
            alert("Must enter text")
            return;
        }
        if((method === "chefId") && requested.search("^[0-9]+$")){
            alert("Must enter a number")
            return
        }
        const apiUrl = `/api/chefed/${method}/${requested}`
        $.ajax({
            url: apiUrl,
            type: 'GET',
            contentType: 'application/json',
            success: function(data){
                tab="<table>"
                tableInit()
                for(let i = 0; i<data.length; i++){
                    let line = data[i];
                    tableSeed(line)

                }
                tab+="</table>"
                $("#chefDiv").html(tab)
            },
            error: function(data){
                alert(data.responseText)

            }
        })


    })

    $("#addBtn").click(function(){
        $("#addChef").toggle()
    })
    $("#updBtn").click(function(){
        $("#updChef").toggle()
    })
    $("#delBtn").click(function(){
        $("#delChef").toggle()
    })


    $("#addSubmit").click(function(event) {
        event.preventDefault()
        const apiUrl = "/api/addChef"
        let firstName = $("#firstName").val()
        let lastName = $("#lastName").val()
        let email = $("#email").val()
        let salary = $("#salary").val()
        let specialty = $("#specialty").val()
        let yrsOfExperience = $("#yrsOfExperience").val()

        if(checkEmpty(firstName, lastName, email, salary, specialty, yrsOfExperience) === false){
            return
        }

        $.ajax({
            url: apiUrl,
            type: 'POST',
            contentType: 'application/JSON',
            data: JSON.stringify({firstName: firstName, lastName: lastName, email:email, salary: salary,specialty: specialty, yrsOfExperience: yrsOfExperience, dishList: objects}),
            success: function (data) {
                tab="<table>"
                tableInit()
                for (let i = 0; i < data.length; i++) {
                    let line = data[i]
                    tableSeed(line)
                }
                tab += "</table>"
                $("#chefDiv").html(tab)
            },
            error: function (data) {
                alert(data.responseText)

            }

        })

    })

    $("#dishChefBtn").click(function(){
        $("#dishChef").html(
        `<div>
            <label>Dish Name: </label>
        <input type="text" id="dishName" name="dishName" placeholder="dishName">
        </div>
        <div>
            <label>Description: </label>
            <input type="text" id="description" name="description" placeholder="description">
        </div>
        <div>
            <label>Price: </label>
            <input type="number" id="price" name="price" placeholder="price">
        </div>
        <button id="dishChefSubmit" type="button">Submit</button>
`
        )
    })

    $(document).on('click',"#dishChefSubmit",(function(){
        let dishName = $("#dishName").val()
        let description = $("#description").val()
        let price = $("#price").val()
        checkEmpty(dishName, description, price)
        objects.push({dishName: dishName, description: description,price: price})
        console.log(objects)
    }))
    $("#updSubmit").click(function (event) {
        event.preventDefault()
        const apiUrl = "/api/updChef"
        let id = $("#idUpd").val()
        let email = $("#emailUpd").val()
        let salary = $("#salaryUpd").val()
        let yrsOfExperience = $("#yrsUpd").val()
        if(checkEmpty(id, email, salary, yrsOfExperience) === false){
            return;
        }
        $.ajax({
            url: apiUrl,
            type: 'POST',
            data: {chefId: id, email:email, salary: salary, yrsOfExperience: yrsOfExperience},
            success: function (data) {
                tab="<table>"
                tableInit()
                for (let i = 0; i < data.length; i++) {
                    let line = data[i]
                    tableSeed(line)
                }
                tab += "</table>"
                $("#chefDiv").html(tab)
            },
            error: function (data) {
                alert(data.responseText)
            }
        })
    })

    $("#delSubmit").click(function(e){
        const apiUrl = "/api/delChef"
        let id = $("#chefIdDel").val();
        checkEmpty(id)
        $.ajax({
            url: apiUrl,
            type: 'DELETE',
            data:{chefId: id},
            success: function(data){
                alert(data)

            },
            error: function(data){
                alert(data.responseText)
            }
        })
        e.preventDefault();
    })

</script>
</html>
