<!DOCTYPE html>
<html>
<head>
  <title>Customers</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    input, button {
      margin: 4px;
      padding: 5px;
    }
  </style>
</head>

<body>

<h2>Customer List</h2>
<button id="loadBtn">Load Customers</button>

<div id="result"></div>

<h3>Add Customer</h3>
<input type="text" id="firstName" placeholder="First Name">
<input type="text" id="lastName" placeholder="Last Name">
<input type="text" id="preference" placeholder="Preference">
<button id="addBtn">Add Customer</button>

<h3>Update Customer Data</h3>
<input type="number" id="editCustomerId" placeholder="Customer ID">
<input type="text" id="editFirstName" placeholder="New First Name">
<input type="text" id="editLastName" placeholder="New Last Name">
<input type="text" id="editPreference" placeholder="New Preference">
<button id="editBtn">Update Customer</button>

<h3>Update Customer Waiter</h3>
<input type="number" id="updateCustomerId" placeholder="Customer ID">
<input type="number" id="updateWaiterId" placeholder="New Waiter ID">
<button id="updateBtn">Update Waiter</button>

<script>

  $("#loadBtn").click(function () {
    $.get("/api/customers", function(data){

      var table = "<table>";
      table += "<tr><th>ID</th><th>First Name</th><th>Last Name</th><th>Preference</th><th>Assigned Waiter</th><th>Delete</th></tr>";

      for (var i = 0; i < data.length; i++) {
        let c = data[i];

        let waiterName = "None";
        if (c.assignedWaiter) {
          waiterName = c.assignedWaiter.firstName + " " + c.assignedWaiter.lastName;
        }

        table += "<tr>";
        table += "<td>" + c.customerId + "</td>";
        table += "<td>" + c.firstName + "</td>";
        table += "<td>" + c.lastName + "</td>";
        table += "<td>" + c.preference + "</td>";
        table += "<td>" + waiterName + "</td>";
        table += "<td><button onclick='deleteCustomer(" + c.customerId + ")'>Delete</button></td>";
        table += "</tr>";
      }

      table += "</table>";
      $("#result").html(table);
    });

  });

  $("#addBtn").click(function(){
    let firstName = $("#firstName").val().trim();
    let lastName = $("#lastName").val().trim();
    let preference = $("#preference").val().trim();

    if (firstName === "" || lastName === "" || preference === "") {
      alert("All fields are required");
      return;
    }

    if (!isNaN(firstName) || !isNaN(lastName) || !isNaN(preference)) {
      alert("Fields cannot be only numbers");
      return;
    }

    let customer = {
      firstName: firstName,
      lastName: lastName,
      preference: preference
    };

    $.ajax({
      url: "/api/customers",
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify(customer),
      success: function(){
        alert("Customer added");
        $("#firstName").val("");
        $("#lastName").val("");
        $("#preference").val("");
        $("#loadBtn").click();
      },
      error: function(xhr){
        alert("Error adding customer: " + xhr.responseText);
      }
    });

  });

  $("#editBtn").click(function(){
    let customerId = $("#editCustomerId").val();
    let firstName = $("#editFirstName").val().trim();
    let lastName = $("#editLastName").val().trim();
    let preference = $("#editPreference").val().trim();

    if (customerId === "" || firstName === "" || lastName === "" || preference === "") {
      alert("Customer ID, first name, last name, and preference are required");
      return;
    }

    if (isNaN(customerId)) {
      alert("Customer ID must be a number");
      return;
    }

    if (!isNaN(firstName) || !isNaN(lastName) || !isNaN(preference)) {
      alert("First name, last name, and preference cannot be only numbers");
      return;
    }

    let updatedCustomer = {
      firstName: firstName,
      lastName: lastName,
      preference: preference
    };

    $.ajax({
      url: "/api/customers/" + customerId,
      type: "PUT",
      contentType: "application/json",
      data: JSON.stringify(updatedCustomer),
      success: function(){
        alert("Customer updated");
        $("#editCustomerId").val("");
        $("#editFirstName").val("");
        $("#editLastName").val("");
        $("#editPreference").val("");
        $("#loadBtn").click();
      },
      error: function(xhr){
        alert("Error updating customer: " + xhr.responseText);
      }
    });

  });

  $("#updateBtn").click(function(){
    let customerId = $("#updateCustomerId").val();
    let waiterId = $("#updateWaiterId").val();

    if (customerId === "" || waiterId === "") {
      alert("Both Customer ID and Waiter ID are required");
      return;
    }

    if (isNaN(customerId) || isNaN(waiterId)) {
      alert("IDs must be numbers");
      return;
    }

    $.ajax({
      url: "/api/customers/" + customerId + "/waiter/" + waiterId,
      type: "PUT",
      success: function(){
        alert("Waiter updated");
        $("#updateCustomerId").val("");
        $("#updateWaiterId").val("");
        $("#loadBtn").click();
      },
      error: function(xhr){
        alert("Error updating waiter: " + xhr.responseText);
      }
    });

  });

  function deleteCustomer(id) {
    $.ajax({
      url: "/api/customers/" + id,
      type: "DELETE",
      success: function(){
        alert("Customer deleted");
        $("#loadBtn").click();
      },
      error: function(xhr){
        alert("Error deleting customer: " + xhr.responseText);
      }
    });

  }

</script>

</body>
</html>
